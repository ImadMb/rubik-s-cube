<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&display=swap"
        rel="stylesheet">
    <title>Rubik's Cube</title>
</head>

<body>
    <div class="body-container">
        <div id="intro">
            <h1>Rubik's Cube</h1>
            <h2>By Imed</h2>
        </div>

        <div class="container">
            <button id="rotateUp" onclick="rotateCubeUp();">👆</button>
            <button id="rotateLeft" onclick="rotateCubeLeft();">👈</button>
            <div class="cube">
                <div class="cube-cell e-1 first-row first-column"></div>
                <div class="cube-cell e-2 first-row"></div>
                <div class="cube-cell e-3 first-row"></div>
                <div class="cube-cell e-4 first-row"></div>
                <div class="cube-cell e-5 first-row last-column"></div>
                <div class="cube-cell e-6 first-column"></div>
                <div class="cube-cell e-7"></div>
                <div class="cube-cell e-8"></div>
                <div class="cube-cell e-9"></div>
                <div class="cube-cell e-10 last-column"></div>
                <div class="cube-cell e-11 first-column"></div>
                <div class="cube-cell e-12"></div>
                <div class="cube-cell e-13"></div>
                <div class="cube-cell e-14"></div>
                <div class="cube-cell e-15 last-column"></div>
                <div class="cube-cell e-16 first-column"></div>
                <div class="cube-cell e-17"></div>
                <div class="cube-cell e-18"></div>
                <div class="cube-cell e-19"></div>
                <div class="cube-cell e-20 last-column"></div>
                <div class="cube-cell e-21 last-row first-column"></div>
                <div class="cube-cell e-22 last-row"></div>
                <div class="cube-cell e-23 last-row"></div>
                <div class="cube-cell e-24 last-row"></div>
                <div class="cube-cell e-25 last-row last-column"></div>
            </div>
            <button id="rotateRight" onclick="rotateCubeRight();">👉</button>
            <button id="rotateBottom" onclick="rotateCubeDown();">👇</button>

        </div>
    </div>
    <script src="script.js"></script>
</body>


</html>
